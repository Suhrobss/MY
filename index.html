<script>
document.addEventListener('DOMContentLoaded', () => {
  const sectionIds = [
    'cover',
    'hero',
    'about',
    'directions',
    'sailsmart',
    'lawhub',
    'leadership',
    'community',
    'international',
    'impact',
    'contact'
  ];

  const header = document.getElementById('header');
  const prevBtn = document.getElementById('prevSection');
  const nextBtn = document.getElementById('nextSection');
  const dotLinks = Array.from(document.querySelectorAll('.dot-link'));
  const sections = sectionIds
    .map(id => document.getElementById(id))
    .filter(Boolean);

  const qrModal = document.getElementById('qrModal');
  const openQrModal = document.getElementById('openQrModal');
  const closeQrModal = document.getElementById('closeQrModal');

  function getHeaderOffset() {
    return (header ? header.offsetHeight : 0) + 12;
  }

  function clampIndex(index) {
    return Math.max(0, Math.min(index, sections.length - 1));
  }

  function getCurrentSectionIndex() {
    const marker = window.scrollY + getHeaderOffset() + window.innerHeight * 0.22;
    let current = 0;

    sections.forEach((section, index) => {
      if (marker >= section.offsetTop) {
        current = index;
      }
    });

    return current;
  }

  function updateDots(forcedIndex = null) {
    const currentIndex = typeof forcedIndex === 'number'
      ? forcedIndex
      : getCurrentSectionIndex();

    dotLinks.forEach((link, index) => {
      link.classList.toggle('active', index === currentIndex);
    });
  }

  function triggerSectionReveal(section) {
    if (!section) return;

    const revealItems = Array.from(section.querySelectorAll('.reveal'));
    if (!revealItems.length) return;

    revealItems.forEach((item, index) => {
      item.classList.remove('visible');
      item.style.transitionDelay = `${index * 80}ms`;
    });

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        revealItems.forEach(item => item.classList.add('visible'));
      });
    });
  }

  let navRevealTimer = null;

  function scrollToSection(index) {
    const safeIndex = clampIndex(index);
    const target = sections[safeIndex];
    if (!target) return;

    const top = window.scrollY + target.getBoundingClientRect().top - getHeaderOffset();

    window.scrollTo({
      top: Math.max(0, top),
      behavior: 'smooth'
    });

    updateDots(safeIndex);

    clearTimeout(navRevealTimer);
    navRevealTimer = setTimeout(() => {
      triggerSectionReveal(target);
      updateDots(safeIndex);
    }, 420);
  }

  dotLinks.forEach((link, index) => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      scrollToSection(index);
    });
  });

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      scrollToSection(getCurrentSectionIndex() - 1);
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      scrollToSection(getCurrentSectionIndex() + 1);
    });
  }

  window.addEventListener('keydown', (e) => {
    const tag = document.activeElement?.tagName;
    const isEditable = document.activeElement?.isContentEditable;

    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || isEditable) return;
    if (qrModal && qrModal.classList.contains('open')) return;

    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      scrollToSection(getCurrentSectionIndex() - 1);
    }

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      scrollToSection(getCurrentSectionIndex() + 1);
    }
  });

  const revealElements = Array.from(document.querySelectorAll('.reveal'));
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    threshold: 0.14,
    rootMargin: '0px 0px -8% 0px'
  });

  revealElements.forEach((el, index) => {
    el.style.transitionDelay = `${(index % 6) * 70}ms`;
    revealObserver.observe(el);
  });

  const accordionItems = Array.from(document.querySelectorAll('.acc-item'));
  let accordionAutoIndex = 0;
  let accordionAutoTimer = null;
  let accordionAutoPaused = false;

  function openAccordionItem(item) {
    if (!item) return;

    accordionItems.forEach(other => {
      const body = other.querySelector('.acc-body');
      other.classList.remove('open');
      if (body) body.style.maxHeight = null;
    });

    item.classList.add('open');
    const body = item.querySelector('.acc-body');
    if (body) {
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  }

  function startAccordionAutoRotate() {
    if (window.innerWidth <= 760 || accordionItems.length <= 1) return;

    clearInterval(accordionAutoTimer);
    accordionAutoTimer = setInterval(() => {
      if (accordionAutoPaused) return;
      accordionAutoIndex = (accordionAutoIndex + 1) % accordionItems.length;
      openAccordionItem(accordionItems[accordionAutoIndex]);
    }, 3200);
  }

  accordionItems.forEach((item, index) => {
    const btn = item.querySelector('.acc-btn');

    if (btn) {
      btn.addEventListener('click', () => {
        const isOpen = item.classList.contains('open');
        accordionAutoPaused = true;
        clearInterval(accordionAutoTimer);

        if (isOpen) {
          item.classList.remove('open');
          const body = item.querySelector('.acc-body');
          if (body) body.style.maxHeight = null;
        } else {
          accordionAutoIndex = index;
          openAccordionItem(item);
        }

        setTimeout(() => {
          accordionAutoPaused = false;
          startAccordionAutoRotate();
        }, 7000);
      });
    }

    item.addEventListener('mouseenter', () => {
      accordionAutoPaused = true;
    });

    item.addEventListener('mouseleave', () => {
      accordionAutoPaused = false;
    });
  });

  if (accordionItems.length) {
    openAccordionItem(accordionItems[0]);
    startAccordionAutoRotate();
  }

  const counters = document.querySelectorAll('.count');
  const counterObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;

      const el = entry.target;
      if (el.dataset.animated === 'true') return;

      const target = +el.dataset.target;
      let current = 0;
      const duration = 1400;
      const stepTime = Math.max(16, duration / Math.max(target, 1));

      const timer = setInterval(() => {
        current += Math.ceil(target / 40);
        if (current >= target) {
          current = target;
          clearInterval(timer);
        }
        el.textContent = current;
      }, stepTime);

      el.dataset.animated = 'true';
    });
  }, { threshold: 0.7 });

  counters.forEach(counter => counterObserver.observe(counter));

  function showQrModal() {
    if (!qrModal) return;
    qrModal.classList.add('open');
    qrModal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function hideQrModal() {
    if (!qrModal) return;
    qrModal.classList.remove('open');
    qrModal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  if (openQrModal) openQrModal.addEventListener('click', showQrModal);
  if (closeQrModal) closeQrModal.addEventListener('click', hideQrModal);

  if (qrModal) {
    qrModal.addEventListener('click', (e) => {
      if (e.target === qrModal) {
        hideQrModal();
      }
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && qrModal && qrModal.classList.contains('open')) {
      hideQrModal();
    }
  });

  window.addEventListener('scroll', updateDots, { passive: true });
  window.addEventListener('resize', () => {
    updateDots();
    startAccordionAutoRotate();
  });

  updateDots(0);
  triggerSectionReveal(sections[0]);
});
</script>
